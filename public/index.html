<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research Paper Summarizer</title>
  <style>
    :root {
      --bg: #f6f8fc;
      --panel: #ffffff;
      --text: #1b2a4a;
      --muted: #6d7a96;
      --line: #e2e8f7;
      --accent: #4f46e5;
      --accent-soft: #e7e9ff;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      margin-top: 14px;
      box-shadow: 0 2px 8px rgba(25, 33, 61, 0.04);
    }
    .muted { color: var(--muted); }
    .controls { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
    .tag {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 999px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 13px;
    }
    .tag.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn, .actions button {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      margin: 2px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: #fff;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 12px;
      vertical-align: top;
      text-align: left;
      font-size: 14px;
    }
    th { background: #f8faff; }
    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="wrap">
  <h1>📚 Research Paper Summarizer</h1>
  <div class="muted">Zotero + Mistral + local cache + interactive filtering</div>

  <div class="panel controls">
    <strong>Language:</strong>
    <select id="langSelect" class="btn">
      <option value="en">English</option>
      <option value="fr">Français</option>
    </select>
    <button class="btn" id="clearTagBtn">Clear Tag Filter</button>
  </div>

  <div class="panel">
    <h3>Tags (frequency grouped)</h3>
    <div><strong>High</strong> <span class="muted">(≥5)</span></div>
    <div id="tagsHigh" class="controls"></div>
    <div><strong>Medium</strong> <span class="muted">(2-4)</span></div>
    <div id="tagsMedium" class="controls"></div>
    <div><strong>Low</strong> <span class="muted">(1)</span></div>
    <div id="tagsLow" class="controls"></div>
  </div>

  <div class="panel">
    <h3>Papers</h3>
    <div id="stats" class="muted"></div>
    <table>
      <thead>
        <tr>
          <th style="width:35%">Title</th>
          <th style="width:20%">Authors</th>
          <th style="width:20%">Tags</th>
          <th style="width:25%">Actions</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>

  <div class="panel">
    <h3>Summary</h3>
    <div id="summaryMeta" class="muted"></div>
    <pre id="output">Click a summary button.</pre>
  </div>
</div>

<script>
let papers = []
let tags = { high: [], medium: [], low: [] }
let currentTag = null

function renderTagGroup(containerId, list) {
  const container = document.getElementById(containerId)
  container.innerHTML = ''
  list.forEach(({ tag, count }) => {
    const b = document.createElement('button')
    b.className = `tag ${currentTag === tag ? 'active' : ''}`
    b.innerText = `${tag} (${count})`
    b.onclick = () => {
      currentTag = tag
      loadPapers()
    }
    container.appendChild(b)
  })
}

function renderTags() {
  renderTagGroup('tagsHigh', tags.high || [])
  renderTagGroup('tagsMedium', tags.medium || [])
  renderTagGroup('tagsLow', tags.low || [])
}

function renderTable() {
  const tbody = document.getElementById('table')
  tbody.innerHTML = ''

  papers.forEach(p => {
    const row = document.createElement('tr')
    const authorsText = (p.authors || []).join(', ')
    const tagsText = (p.tags || []).join(', ')
    row.innerHTML = `
      <td>${p.title}</td>
      <td>${authorsText || '-'}</td>
      <td>${tagsText || '-'}</td>
      <td class="actions">
        <button onclick="loadSummary('${p.id}','general')">General</button>
        <button onclick="loadSummary('${p.id}','methodology')">Methodology</button>
        <button onclick="loadSummary('${p.id}','dataset')">Dataset</button>
      </td>
    `
    tbody.appendChild(row)
  })
}

async function loadPapers() {
  const query = currentTag ? `?tag=${encodeURIComponent(currentTag)}` : ''
  const res = await fetch(`/api/papers${query}`)
  const payload = await res.json()

  papers = payload.papers || []
  tags = payload.tags || { high: [], medium: [], low: [] }

  document.getElementById('stats').innerText = `Showing ${payload.returned}/${payload.total} papers`
  renderTags()
  renderTable()
}

async function loadSummary(id, type) {
  const language = document.getElementById('langSelect').value
  const output = document.getElementById('output')
  const meta = document.getElementById('summaryMeta')
  meta.innerText = `Paper: ${id} | Type: ${type} | Lang: ${language}`
  output.innerText = '⏳ Loading...'

  try {
    const res = await fetch(`/api/summaries/${id}?type=${encodeURIComponent(type)}&lang=${encodeURIComponent(language)}`)
    const data = await res.json()
    if (!res.ok) {
      output.innerText = `❌ ${data.error || 'Request failed'}`
      return
    }
    meta.innerText += ` | Source: ${data.cached ? 'cache' : 'generated'}`
    output.innerText = data.summary || 'No summary returned.'
  } catch {
    output.innerText = '❌ Request failed'
  }
}

document.getElementById('clearTagBtn').onclick = () => {
  currentTag = null
  loadPapers()
}

loadPapers()
</script>

</body>
</html>
